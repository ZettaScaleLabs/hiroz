name: Docs — External Link Check

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  check_links:
    name: Check external links
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # yamllint disable rule:line-length
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://ros.cachix.org https://hiroz.cachix.org
            extra-trusted-public-keys = ros.cachix.org-1:dSyZxI8geDCJrwgvCOHDoAfOm5sV1wCPjBkKL+38Rvo= hiroz.cachix.org-1:wKJuqEckTG0DL3Df7Ly9OVsg5S5TGBHtvlPGs+vlqrY=
      # yamllint enable rule:line-length

      - name: Build MkDocs
        run: nix develop '.#pureRust-ci' -c mkdocs build --strict

      - name: Check external links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --root-dir ${{ github.workspace }}/site
            --exclude-path ${{ github.workspace }}/site/overrides
            --config .lychee.toml
            ./site
          fail: false  # report only — don't block on transient failures

      - name: Open issue on link failures
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'docs: broken external links detected'
          content-filepath: ./lychee/out.md
          labels: documentation
